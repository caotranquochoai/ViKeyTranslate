name: Windows Build CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Cho phép kích hoạt thủ công

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Tự động cache thư viện Flutter
          cache: true
      
      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows Executable (.exe)
        run: flutter build windows

      - name: Create MSIX package (.msix)
        run: dart run msix:create

      - name: Upload EXE Release
        uses: actions/upload-artifact@v4
        with:
          name: ViKeyTranslate_v1.0-windows-executable
          path: build\windows\x64\runner\Release\keyboard_translator.exe

      - name: Upload MSIX Package
        uses: actions/upload-artifact@v4
        with:
          name: ViKeyTranslate_v1.0-windows-msix
          path: build\windows\x64\runner\Release\*.msix
